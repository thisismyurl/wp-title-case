name: Bug Report
description: Report something that is not working as expected.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in all required fields.
  - type: input
    id: wp_version
    attributes:
      label: WordPress Version
      placeholder: "e.g. 6.7.2"
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: PHP Version
      placeholder: "e.g. 8.2"
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Plugin Version
      placeholder: "e.g. 0.6112"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Active plugins, theme, hosting environment, error log snippets, screenshots.

