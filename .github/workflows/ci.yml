name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: PHP Syntax (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["7.4", "8.0", "8.1", "8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: PHP syntax check
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "::error file=$file::PHP syntax error"
              php -l "$file" || true
              fail=1
            fi
          done < <(find . -name "*.php" -not -path "./.git/*" -not -path "./vendor/*" -print0)
          exit $fail

  phpcs:
    name: PHPCS (WordPress Coding Standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer
      - name: Install PHPCS + WPCS
        run: |
          composer global require --dev squizlabs/php_codesniffer wp-coding-standards/wpcs phpcsstandards/phpcsutils phpcsstandards/phpcsextra dealerdirect/phpcodesniffer-composer-installer
          echo "$(composer global config bin-dir --absolute)" >> "$GITHUB_PATH"
      - name: Run PHPCS
        run: phpcs --standard=phpcs.xml.dist
